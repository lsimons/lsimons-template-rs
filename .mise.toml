# mise: https://mise.jdx.dev/
#
# `mise install` installs the Rust toolchain; `mise run <task>` wraps
# cargo commands. Cargo.toml's `rust-version` remains the MSRV
# authority.

[tools]
rust = "latest"

[env]
CARGO_TERM_COLOR = "always"
RUSTFLAGS = "-D warnings"
_.file = { path = ".env", optional = true }

[tasks.init]
description = "Rename this template to a new project (see scripts/init.py)"
run = "python3 scripts/init.py"

[tasks.lint]
description = "cargo fmt --check + clippy -D warnings"
run = [
    "cargo fmt --all --check",
    "cargo clippy --all-targets --all-features -- -D warnings",
]

[tasks.format]
description = "cargo fmt"
run = "cargo fmt --all"

[tasks.test]
description = "cargo test --all-targets --locked"
run = "cargo test --all-targets --locked"

[tasks.build]
description = "cargo build --all-targets --locked"
run = "cargo build --all-targets --locked"

[tasks.doc]
description = "cargo doc --no-deps --all-features (RUSTDOCFLAGS=-D warnings)"
env = { RUSTDOCFLAGS = "-D warnings" }
run = "cargo doc --no-deps --all-features"

[tasks.ci]
description = "Full CI gate"
depends = ["lint", "test", "build", "doc"]

[tasks.ci-watch]
description = "Watch GitHub Actions CI for the current branch; exits non-zero on failure"
run = """
sleep 5
run_id=$(gh run list --branch "$(git branch --show-current)" --limit 1 --json databaseId --jq '.[0].databaseId')
if [ -z "$run_id" ]; then echo "No run found for current branch" >&2; exit 1; fi
gh run watch --exit-status "$run_id"
"""
